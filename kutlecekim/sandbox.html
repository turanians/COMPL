<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kütleçekim Sandbox & Yörünge Simülasyonu</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #050508; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    h1 { margin: 0 0 5px 0; font-size: 1.6rem; color: #ffd166; text-align: center; }
    p.subtitle { margin: 0 0 20px 0; color: #8d99ae; font-size: 0.9rem; text-align: center; }

    .main-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1200px; width: 100%; }
    
    .canvas-container { position: relative; background: #080811; border-radius: 12px; border: 1px solid #1d1e2c; box-shadow: 0 10px 30px rgba(0,0,0,0.8); cursor: crosshair; }
    canvas { display: block; border-radius: 12px; }

    .controls { flex: 1; min-width: 280px; background: #0f101d; padding: 20px; border-radius: 12px; border: 1px solid #1d1e2c; display: flex; flex-direction: column; gap: 15px; }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-group label { font-size: 0.85rem; color: #a8b2d1; display: flex; justify-content: space-between; }
    .control-group span { color: #ffd166; font-family: monospace; }
    
    input[type="range"] { width: 100%; accent-color: #ffd166; background: #1d1e2c; border-radius: 4px; height: 6px; }
    
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .btn-primary { background: #ffd166; color: #050508; }
    .btn-primary:hover { background: #e0b753; }
    .btn-secondary { background: #1d1e2c; color: #ccd6f6; border: 1px solid #2b2d42; }
    .btn-secondary:hover { background: #2b2d42; }

    .info-box { background: #151627; border-left: 3px solid #ffd166; padding: 10px 12px; font-size: 0.8rem; color: #8d99ae; line-height: 1.5; border-radius: 0 6px 6px 0; }
  </style>
</head>
<body>

  <h1>Kütleçekim Sandbox (Gravity Simulator)</h1>
  <p class="subtitle">Ekrana tıkla, sürükle ve kendi gezegen sistemini kur!</p>

  <div class="main-container">
    <div class="canvas-container">
      <canvas id="simCanvas" width="700" height="600"></canvas>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>Eklenen Cisim Kütlesi: <span id="v_mass">50</span></label>
        <input type="range" id="s_mass" min="1" max="1000" value="50">
      </div>

      <div class="control-group">
        <label>Kütleçekim Sabiti (G): <span id="v_g">1.0</span></label>
        <input type="range" id="s_g" min="0.1" max="5.0" step="0.1" value="1.0">
      </div>

      <div class="control-group">
        <label>İz Uzunluğu: <span id="v_trail">300</span></label>
        <input type="range" id="s_trail" min="0" max="1000" step="50" value="300">
      </div>

      <div class="btn-group">
        <button class="btn-primary" id="btnSun">Merkeze Güneş Ekle</button>
        <button class="btn-secondary" id="btnClear">Tümünü Temizle</button>
      </div>

      <div class="btn-group">
        <button class="btn-secondary" id="btnPause">Durdur / Başlat</button>
        <button class="btn-secondary" id="btnRandom">Rastgele Sistem</button>
      </div>

      <div class="info-box">
        🎮 <b>Kullanım:</b><br>
        • <b>Sol Tık + Sürükle:</b> Gezegeni fırlatma hızı vererek oluşturır.<br>
        • <b>Çarpışma:</b> İki cisim birbirine değdiğinde büyük olan küçüğü yutar ve kütlesi artar.
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // Cisim Sınıfı
    class Body {
      constructor(x, y, vx, vy, mass, color) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = Math.max(3, Math.pow(mass, 1/3) * 2.5);
        this.color = color || `hsl(${Math.random() * 360}, 80%, 60%)`;
        this.trail = [];
      }

      update(bodies, G) {
        // Kütleçekim Kuvvetleri
        for (let other of bodies) {
          if (other === this) continue;

          let dx = other.x - this.x;
          let dy = other.y - this.y;
          let distSq = dx * dx + dy * dy;
          let dist = Math.sqrt(distSq);

          // Çakışmayı ve aşırı yüksek ivmeyi engellemek için minimum mesafe
          if (distSq < 100) distSq = 100;

          // F = G * m1 * m2 / r^2 -> a = F / m1 = G * m2 / r^2
          let force = (G * other.mass) / distSq;
          this.vx += (dx / dist) * force;
          this.vy += (dy / dist) * force;
        }

        // Konum güncelleme
        this.x += this.vx;
        this.y += this.vy;

        // İz çizgisini kaydet
        const maxTrail = parseInt(document.getElementById('s_trail').value);
        if (maxTrail > 0) {
          this.trail.push({ x: this.x, y: this.y });
          if (this.trail.length > maxTrail) this.trail.shift();
        } else {
          this.trail = [];
        }
      }

      draw() {
        // İz Çizimi
        if (this.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          for (let i = 1; i < this.trail.length; i++) {
            ctx.lineTo(this.trail[i].x, this.trail[i].y);
          }
          ctx.strokeStyle = this.color;
          ctx.globalAlpha = 0.3;
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.globalAlpha = 1.0;
        }

        // Cisim Çizimi
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = this.mass > 500 ? 15 : 5;
        ctx.fill();
        ctx.shadowBlur = 0; // Performans için sıfırla
      }
    }

    // Durum Değişkenleri
    let bodies = [];
    let running = true;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let currentMouse = { x: 0, y: 0 };

    // DOM Kontrolleri
    const s_mass = document.getElementById('s_mass'), v_mass = document.getElementById('v_mass');
    const s_g = document.getElementById('s_g'), v_g = document.getElementById('v_g');
    const s_trail = document.getElementById('s_trail'), v_trail = document.getElementById('v_trail');

    s_mass.addEventListener('input', () => v_mass.textContent = s_mass.value);
    s_g.addEventListener('input', () => v_g.textContent = parseFloat(s_g.value).toFixed(1));
    s_trail.addEventListener('input', () => v_trail.textContent = s_trail.value);

    document.getElementById('btnPause').addEventListener('click', () => running = !running);
    document.getElementById('btnClear').addEventListener('click', () => bodies = []);
    document.getElementById('btnSun').addEventListener('click', addSun);
    document.getElementById('btnRandom').addEventListener('click', createRandomSystem);

    function addSun() {
      bodies.push(new Body(canvas.width / 2, canvas.height / 2, 0, 0, 2000, '#ffcc00'));
    }

    function createRandomSystem() {
      bodies = [];
      addSun(); // Merkeze yıldız
      const numPlanets = 12;
      for (let i = 0; i < numPlanets; i++) {
        let angle = Math.random() * Math.PI * 2;
        let dist = 80 + Math.random() * 200;
        let x = canvas.width / 2 + Math.cos(angle) * dist;
        let y = canvas.height / 2 + Math.sin(angle) * dist;

        // Yaklaşık yörünge hızı (v = sqrt(G*M/r))
        let speed = Math.sqrt((parseFloat(s_g.value) * 2000) / dist);
        let vx = -Math.sin(angle) * speed;
        let vy = Math.cos(angle) * speed;

        bodies.push(new Body(x, y, vx, vy, 10 + Math.random() * 40));
      }
    }

    // Fare Etkileşimi
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      dragStart.x = e.clientX - rect.left;
      dragStart.y = e.clientY - rect.top;
      currentMouse = { ...dragStart };
      isDragging = true;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const rect = canvas.getBoundingClientRect();
      currentMouse.x = e.clientX - rect.left;
      currentMouse.y = e.clientY - rect.top;
    });

    canvas.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;

      let vx = (dragStart.x - currentMouse.x) * 0.05;
      let vy = (dragStart.y - currentMouse.y) * 0.05;
      let mass = parseFloat(s_mass.value);

      bodies.push(new Body(dragStart.x, dragStart.y, vx, vy, mass));
    });

    // Çarpışma Tespiti ve Birleşme (Momentum Korunumu)
    function handleCollisions() {
      for (let i = 0; i < bodies.length; i++) {
        for (let j = i + 1; j < bodies.length; j++) {
          let b1 = bodies[i];
          let b2 = bodies[j];

          let dx = b2.x - b1.x;
          let dy = b2.y - b1.y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < b1.radius + b2.radius) {
            // Çarpışma gerçekleşti: Tam esnek olmayan birleşme
            let totalMass = b1.mass + b2.mass;
            let newVx = (b1.vx * b1.mass + b2.vx * b2.mass) / totalMass;
            let newVy = (b1.vy * b1.mass + b2.vy * b2.mass) / totalMass;

            // Büyük olan küçük olanı yutar
            if (b1.mass >= b2.mass) {
              b1.mass = totalMass;
              b1.radius = Math.max(3, Math.pow(totalMass, 1/3) * 2.5);
              b1.vx = newVx;
              b1.vy = newVy;
              bodies.splice(j, 1);
            } else {
              b2.mass = totalMass;
              b2.radius = Math.max(3, Math.pow(totalMass, 1/3) * 2.5);
              b2.vx = newVx;
              b2.vy = newVy;
              bodies.splice(i, 1);
            }
            return; // Dizide eleman silindiği için döngüyü sıfırla
          }
        }
      }
    }

    // Ana Döngü
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const G = parseFloat(s_g.value);

      if (running) {
        for (let body of bodies) {
          body.update(bodies, G);
        }
        handleCollisions();
      }

      for (let body of bodies) {
        body.draw();
      }

      // Fırlatma Çizgisi Çizimi (Sürükleme yapılıyorsa)
      if (isDragging) {
        ctx.beginPath();
        ctx.moveTo(dragStart.x, dragStart.y);
        ctx.lineTo(currentMouse.x, currentMouse.y);
        ctx.strokeStyle = '#ffd166';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Başlangıç noktasındaki hayali gezegen
        let r = Math.max(3, Math.pow(parseFloat(s_mass.value), 1/3) * 2.5);
        ctx.beginPath();
        ctx.arc(dragStart.x, dragStart.y, r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 209, 102, 0.5)';
        ctx.fill();
      }

      requestAnimationFrame(loop);
    }

    // Başlangıçta rastgele bir sistem oluştur
    createRandomSystem();
    loop();
  </script>
</body>
</html>
