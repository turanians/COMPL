<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İtme - Momentum Teoremi Vektörel Analiz Labı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c0e14;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ecf0f1;
            background: rgba(15, 18, 26, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #34495e;
            width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }
        #history-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ecf0f1;
            background: rgba(15, 18, 26, 0.95);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e67e22;
            width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 10;
            font-size: 0.8em;
            display: flex;
            flex-direction: column;
        }
        #history-scroll {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 5px;
        }
        .history-item {
            border-bottom: 1px solid #34495e;
            padding: 4px 0;
            color: #f1c40f;
        }
        #history-total {
            border-top: 2px dashed #e67e22;
            padding-top: 8px;
            margin-top: 5px;
            color: #fff;
            font-weight: bold;
        }
        #signature-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #7f8c8d;
            font-size: 0.75em;
            letter-spacing: 2px;
            z-index: 10;
            text-transform: uppercase;
            border-left: 2px solid #e67e22;
            padding-left: 8px;
        }
        button {
            width: 100%;
            background: #27ae60;
            border: 1px solid #2196f3;
            color: white;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1.05em;
            margin-top: 10px;
            transition: all 0.2s;
        }
        button.paused {
            background: #e74c3c;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            margin-top: 5px;
        }
        .data-box {
            margin-top: 10px;
            font-size: 0.85em;
            line-height: 1.4;
            border-top: 1px solid #2c3e50;
            padding-top: 8px;
        }
        .vector-label {
            position: absolute;
            z-index: 5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <h3 style="margin: 0 0 5px 0; color: #3498db;">İtme - Momentum Analizi</h3>
        
        <div style="display: flex; flex-direction: column;">
            <label id="particle-label" for="particle-slider">Parçacık Sayısı: 1</label>
            <input type="range" id="particle-slider" min="1" max="4" value="1" step="1">
        </div>

        <button id="btn-pause" onclick="togglePause()">DURDUR (PAUSE)</button>

        <div class="data-box" style="color: #3498db;">
            <b>&Delta;P Analizi (Mavi):</b><br>
            &Delta;P = (<span id="dp-x">0</span>, <span id="dp-y">0</span>)
        </div>

        <div class="data-box" style="color: #9b59b6;">
            <b>Kümülatif İtme &Sigma;I (Mor):</b><br>
            &Sigma;I = (<span id="i-wall-x">0</span>, <span id="i-wall-y">0</span>)
        </div>

        <div class="data-box" style="color: #2ecc71;">
            Kontrol: <span id="status-check" style="font-weight:bold;">Hesapanıyor...</span>
        </div>
    </div>

    <div id="history-panel">
        <h4 style="margin: 0 0 10px 0; color: #e67e22; border-bottom: 1px solid #e67e22; padding-bottom: 5px;">&Delta;I_duvar Geçmişi (History)</h4>
        <div id="history-scroll">
            <div id="history-list"><i>Henüz çarpışma gerçekleşmedi.</i></div>
        </div>
        <div id="history-total">
            TOPLAM &Sigma;I = (0.000, 0.000)
        </div>
    </div>

    <div id="signature-box">
        Turan Taşköprü<br>
        <span style="font-size:0.85em; color:#555;">Physics Simulation Lab &copy; 2026</span>
    </div>

    <div id="label-ps" class="vector-label" style="background: rgba(46, 204, 113, 0.9); color: #000; display: none;">P_son</div>
    <div id="label-pi" class="vector-label" style="background: rgba(243, 156, 18, 0.9); color: #000; display: none;">-P_ilk</div>
    <div id="label-dp" class="vector-label" style="background: rgba(52, 152, 219, 0.9); color: #fff; display: none;">&Delta;P</div>
    <div id="label-i" class="vector-label" style="background: rgba(155, 89, 182, 0.9); color: #fff; display: none;">&Sigma;I</div>

    <script>
        let isPaused = false;
        let P_initial = [0, 0]; 
        let I_wall = [0, 0];    
        let collisionCount = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0c0e14);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-2, 0, 26); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableRotate = false; 

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const BOX_SIZE = 14;
        const HALF_BOX = BOX_SIZE / 2;
        const WORLD_OFFSET = -8; 
        
        const AXIS_DP_X = 5;  
        const AXIS_I_X = 11;  

        // Sol Kutu
        const boxLine = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, 0.01)),
            new THREE.LineBasicMaterial({ color: 0x34495e, linewidth: 2 })
        );
        boxLine.position.x = WORLD_OFFSET;
        scene.add(boxLine);

        // Analiz Eksenleri
        const axisDP = new THREE.GridHelper(5, 5, 0x3498db, 0x2c3e50);
        axisDP.rotation.x = Math.PI / 2; axisDP.position.set(AXIS_DP_X, 0, 0); scene.add(axisDP);

        const axisI = new THREE.GridHelper(5, 5, 0x9b59b6, 0x2c3e50);
        axisI.rotation.x = Math.PI / 2; axisI.position.set(AXIS_I_X, 0, 0); scene.add(axisI);

        // Analiz Vektör Okları
        let arrowPs = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(AXIS_DP_X, 0, 0), 0, 0x2ecc71, 0.25, 0.1); scene.add(arrowPs);
        let arrowPi = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(AXIS_DP_X, 0, 0), 0, 0xf39c12, 0.25, 0.1); scene.add(arrowPi);
        let arrowDP = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(AXIS_DP_X, 0, 0), 0, 0x3498db, 0.3, 0.12); scene.add(arrowDP);
        let arrowI = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(AXIS_I_X, 0, 0), 0, 0x9b59b6, 0.3, 0.12); scene.add(arrowI);

        let particles = [];
        let wallImpactArrows = []; 
        const scaleFactor = 15; 

        const domLabelPs = document.getElementById('label-ps');
        const domLabelPi = document.getElementById('label-pi');
        const domLabelDp = document.getElementById('label-dp');
        const domLabelI = document.getElementById('label-i');

        function updateLabelPosition(meshPosition, domElement) {
            const wp = meshPosition.clone(); wp.project(camera);
            const x = (wp.x * .5 + .5) * window.innerWidth;
            const y = (-(wp.y * .5) + .5) * window.innerHeight;
            domElement.style.left = `${x}px`; domElement.style.top = `${y}px`;
        }

        function registerWallImpact(posX, posY, impX, impY, wallName) {
            collisionCount++;
            let originX = posX;
            let originY = posY;
            let directionVec = new THREE.Vector3(impX, impY, 0).normalize();
            let impVec = new THREE.Vector3(impX, impY, 0);
            let impLen = impVec.length();
            if(impLen > 0.001) {
                let arrowImp = new THREE.ArrowHelper(directionVec, new THREE.Vector3(originX, originY, 0), impLen * scaleFactor, 0xe67e22, 0.2, 0.08); scene.add(arrowImp); wallImpactArrows.push(arrowImp);
            }
            
            const list = document.getElementById('history-list');
            if(collisionCount === 1) list.innerHTML = "";
            let item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `#${collisionCount} [${wallName} Duvarı] &rarr; I = (${impX.toFixed(3)}, ${impY.toFixed(3)})`;
            list.insertBefore(item, list.firstChild);

            // History altındaki kümülatif toplamı anlık güncelle
            document.getElementById('history-total').innerHTML = `TOPLAM &Sigma;I = (${I_wall[0].toFixed(3)}, ${I_wall[1].toFixed(3)})`;
        }

        function createParticle() {
            const radius = Math.random() * 0.4 + 0.6;
            const mass = Math.PI * Math.pow(radius, 2) * 1.2; 
            const geometry = new THREE.CircleGeometry(radius, 32);
            const baseColor = new THREE.Color(`hsl(${Math.random() * 360}, 85%, 60%)`);
            const material = new THREE.MeshBasicMaterial({ color: baseColor });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            let pos = [(Math.random() - 0.5) * (BOX_SIZE - 3) + WORLD_OFFSET, (Math.random() - 0.5) * (BOX_SIZE - 3)];
            let vel = [(Math.random() - 0.5) * 0.12, (Math.random() - 0.5) * 0.12];
            const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), mesh.position, 0, baseColor, 0.15, 0.06); scene.add(arrowHelper);
            return { mesh, radius, mass, pos, vel, arrowHelper, baseColor };
        }

        function initSystem(count) {
            particles.forEach(p => { scene.remove(p.mesh); scene.remove(p.arrowHelper); });
            wallImpactArrows.forEach(a => scene.remove(a));
            particles = []; wallImpactArrows = []; collisionCount = 0; I_wall = [0, 0];
            document.getElementById('history-list').innerHTML = "<i>Henüz çarpışma gerçekleşmedi.</i>";
            document.getElementById('history-total').innerHTML = "TOPLAM &Sigma;I = (0.000, 0.000)";
            
            for (let i = 0; i < count; i++) particles.push(createParticle());
            
            P_initial = [0, 0];
            particles.forEach(p => { P_initial[0] += p.mass * p.vel[0]; P_initial[1] += p.mass * p.vel[1]; });
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('btn-pause');
            if (isPaused) { btn.innerText = "DEVAM ET (RESUME)"; btn.classList.add('paused'); }
            else { btn.innerText = "DURDUR (PAUSE)"; btn.classList.remove('paused'); }
        }

        function updatePhysics() {
            particles.forEach(p => {
                p.pos[0] += p.vel[0]; p.pos[1] += p.vel[1];
                if (p.pos[0] > HALF_BOX + WORLD_OFFSET - p.radius) {
                    p.pos[0] = HALF_BOX + WORLD_OFFSET - p.radius;
                    let v_ilk = p.vel[0]; p.vel[0] *= -1;
                    let deltaI = p.mass * (p.vel[0] - v_ilk); I_wall[0] += deltaI;
                    registerWallImpact(HALF_BOX + WORLD_OFFSET, p.pos[1], deltaI, 0, "Sağ");
                } 
                else if (p.pos[0] < -HALF_BOX + WORLD_OFFSET + p.radius) {
                    p.pos[0] = -HALF_BOX + WORLD_OFFSET + p.radius;
                    let v_ilk = p.vel[0]; p.vel[0] *= -1;
                    let deltaI = p.mass * (p.vel[0] - v_ilk); I_wall[0] += deltaI;
                    registerWallImpact(-HALF_BOX + WORLD_OFFSET, p.pos[1], deltaI, 0, "Sol");
                }
                if (p.pos[1] > HALF_BOX - p.radius) {
                    p.pos[1] = HALF_BOX - p.radius;
                    let v_ilk = p.vel[1]; p.vel[1] *= -1;
                    let deltaI = p.mass * (p.vel[1] - v_ilk); I_wall[1] += deltaI;
                    registerWallImpact(p.pos[0], HALF_BOX, 0, deltaI, "Üst");
                } 
                else if (p.pos[1] < -HALF_BOX + p.radius) {
                    p.pos[1] = -HALF_BOX + p.radius;
                    let v_ilk = p.vel[1]; p.vel[1] *= -1;
                    let deltaI = p.mass * (p.vel[1] - v_ilk); I_wall[1] += deltaI;
                    registerWallImpact(p.pos[0], -HALF_BOX, 0, deltaI, "Alt");
                }
            });

            if (particles.length > 1) {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const p1 = particles[i]; const p2 = particles[j];
                        let dx = p1.pos[0] - p2.pos[0]; let dy = p1.pos[1] - p2.pos[1];
                        let dist = Math.sqrt(dx*dx + dy*dy); let minDist = p1.radius + p2.radius;
                        if (dist < minDist) {
                            let overlap = minDist - dist;
                            let nx = dx / (dist || 1); let ny = dy / (dist || 1);
                            p1.pos[0] += nx * overlap * 0.5; p1.pos[1] += ny * overlap * 0.5;
                            p2.pos[0] -= nx * overlap * 0.5; p2.pos[1] -= ny * overlap * 0.5;
                            let kx = p1.vel[0] - p2.vel[0]; let ky = p1.vel[1] - p2.vel[1];
                            let p = 2 * (p1.vel[0] * nx + p1.vel[1] * ny - p2.vel[0] * nx - p2.vel[1] * ny) / (p1.mass + p2.mass);
                            if ((kx * nx + ky * ny) < 0) {
                                p1.vel[0] -= p * p2.mass * nx; p1.vel[1] -= p * p2.mass * ny;
                                p2.vel[0] += p * p1.mass * nx; p2.vel[1] += p * p1.mass * ny;
                            }
                        }
                    }
                }
            }
        }

        const slider = document.getElementById('particle-slider');
        slider.addEventListener('input', (e) => {
            if(isPaused) togglePause();
            document.getElementById('particle-label').innerText = `Parçacık Sayısı: ${e.target.value}`;
            initSystem(parseInt(e.target.value));
        });

        initSystem(parseInt(slider.value));

        function animate() {
            requestAnimationFrame(animate);
            if (!isPaused) { updatePhysics(); }

            let P_current = [0, 0];
            particles.forEach(p => {
                p.mesh.position.set(p.pos[0], p.pos[1], 0);
                let px = p.mass * p.vel[0]; let py = p.mass * p.vel[1];
                P_current[0] += px; P_current[1] += py;
                p.arrowHelper.position.copy(p.mesh.position);
                let pV = new THREE.Vector3(px, py, 0);
                if(pV.length() > 0.001) { p.arrowHelper.setDirection(pV.clone().normalize()); p.arrowHelper.setLength(pV.length() * scaleFactor, 0.15, 0.06); }
            });

            let vSon3d = new THREE.Vector3(P_current[0], P_current[1], 0);
            let vIlk3d = new THREE.Vector3(P_initial[0], P_initial[1], 0);
            let vDeltaP3d = new THREE.Vector3().subVectors(vSon3d, vIlk3d);
            let vSumI3d = new THREE.Vector3(I_wall[0], I_wall[1], 0);

            if (isPaused) {
                if(vSon3d.length() > 0.001) {
                    arrowPs.setDirection(vSon3d.clone().normalize()); arrowPs.setLength(vSon3d.length() * scaleFactor, 0.25, 0.1); arrowPs.visible = true;
                    domLabelPs.style.display = 'block'; updateLabelPosition(new THREE.Vector3(AXIS_DP_X, 0, 0).addScaledVector(vSon3d, scaleFactor * 0.5), domLabelPs);
                } else { arrowPs.visible = false; domLabelPs.style.display = 'none'; }
                
                let vNegIlk3d = vIlk3d.clone().negate();
                arrowPi.position.set(AXIS_DP_X + P_current[0] * scaleFactor, P_current[1] * scaleFactor, 0);
                if(vNegIlk3d.length() > 0.001) {
                    arrowPi.setDirection(vNegIlk3d.clone().normalize()); arrowPi.setLength(vNegIlk3d.length() * scaleFactor, 0.25, 0.1); arrowPi.visible = true;
                    domLabelPi.style.display = 'block'; updateLabelPosition(arrowPi.position.clone().addScaledVector(vNegIlk3d, scaleFactor * 0.5), domLabelPi);
                } else { arrowPi.visible = false; domLabelPi.style.display = 'none'; }

                if(vDeltaP3d.length() > 0.001) {
                    arrowDP.setDirection(vDeltaP3d.clone().normalize()); arrowDP.setLength(vDeltaP3d.length() * scaleFactor, 0.3, 0.12); arrowDP.visible = true;
                    domLabelDp.style.display = 'block'; updateLabelPosition(new THREE.Vector3(AXIS_DP_X, 0, 0).addScaledVector(vDeltaP3d, scaleFactor * 0.5), domLabelDp);
                } else { arrowDP.visible = false; domLabelDp.style.display = 'none'; }

                if(vSumI3d.length() > 0.001) {
                    arrowI.setDirection(vSumI3d.clone().normalize()); arrowI.setLength(vSumI3d.length() * scaleFactor, 0.3, 0.12); arrowI.visible = true;
                    domLabelI.style.display = 'block'; updateLabelPosition(new THREE.Vector3(AXIS_I_X, 0, 0).addScaledVector(vSumI3d, scaleFactor * 0.5), domLabelI);
                } else { arrowI.visible = false; domLabelI.style.display = 'none'; }

                document.getElementById('dp-x').innerText = vDeltaP3d.x.toFixed(3); document.getElementById('dp-y').innerText = vDeltaP3d.y.toFixed(3);
                document.getElementById('i-wall-x').innerText = vSumI3d.x.toFixed(3); document.getElementById('i-wall-y').innerText = vSumI3d.y.toFixed(3);

                let diff = new THREE.Vector3().subVectors(vDeltaP3d, vSumI3d);
                if (diff.length() < 0.005) {
                    document.getElementById('status-check').innerText = "&Delta;P = &Sigma;I DOĞRULANDI"; document.getElementById('status-check').style.color = "#2ecc71";
                } else {
                    document.getElementById('status-check').innerText = "Limit Dışı Sapma"; document.getElementById('status-check').style.color = "#e74c3c";
                }
            } else {
                arrowPs.visible = arrowPi.visible = arrowDP.visible = arrowI.visible = false;
                domLabelPs.style.display = domLabelPi.style.display = domLabelDp.style.display = domLabelI.style.display = 'none';
                document.getElementById('status-check').innerText = "Pause Bekleniyor..."; document.getElementById('status-check').style.color = "#f39c12";
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
