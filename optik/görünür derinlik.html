<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ekstrem Renk Dispersiyonu Simülasyonu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        canvas { border: 2px solid #334155; background-color: #020617; box-shadow: 0 10px 30px rgba(0,0,0,0.7); cursor: move; border-radius: 8px; }
        .controls { margin-top: 25px; background: #1e293b; padding: 20px; border-radius: 12px; display: flex; gap: 30px; border: 1px solid #334155; }
        .control-group { display: flex; flex-direction: column; align-items: center; min-width: 180px; }
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9em; color: #94a3b8; }
        .value-label { color: #38bdf8; font-family: monospace; font-size: 1.1em; margin-top: 5px; }
        #status { color: #f43f5e; font-weight: bold; height: 24px; margin-bottom: 10px; font-size: 1.1em; }
        .info-panel { margin-top: 15px; background: rgba(56, 189, 248, 0.1); padding: 10px 20px; border-radius: 8px; border: 1px dashed #38bdf8; font-size: 0.85em; color: #bae6fd; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px;">Ekstrem Renk Dispersiyonu (3x Etki)</h2>
    <div id="status"></div>
    
    <canvas id="simCanvas" width="900" height="550"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>Üst Ortam (n1)</label>
            <input type="range" id="n1Range" min="1" max="1.5" step="0.01" value="1.0">
            <span id="n1Val" class="value-label">1.00</span>
        </div>
        <div class="control-group">
            <label>Alt Ortam Temel (n2)</label>
            <input type="range" id="n2Range" min="1.1" max="2.5" step="0.01" value="1.50">
            <span id="n2Val" class="value-label">1.50</span>
        </div>
        <div class="control-group">
            <label>Dispersiyon Şiddeti</label>
            <input type="range" id="dispRange" min="0" max="0.6" step="0.01" value="0.15">
            <span id="dispVal" class="value-label">0.15</span>
        </div>
    </div>

    <div class="info-panel">
        <strong>Fizik Notu:</strong> Dispersiyon 3 kat artırıldı. Mor ışık için kırıcılık indisi şu an 
        <span id="morN" style="color:#cc44ff; font-weight:bold;">1.80</span>'e kadar çıkabiliyor. 
        Bu yüzden renkler arasındaki dikey mesafe çok daha belirgin!
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        
        const SURFACE_Y = canvas.height / 2;
        let n1 = 1.0, n2Base = 1.50, dispersion = 0.15; // Başlangıç dispersiyonu 0.05'ten 0.15'e (3x) çıkarıldı.
        
        let eyePos = { x: 180, y: 120 };
        let objPos = { x: 650, y: 460 };
        
        const colors = [
            { name: "KIRMIZI", color: "#ff1111", offsetK: 0 },   // n2Base
            { name: "YEŞİL",   color: "#22ff22", offsetK: 1 },   // n2Base + dispersion
            { name: "MOR",     color: "#cc44ff", offsetK: 2 }    // n2Base + 2*dispersion
        ];

        let isDraggingEye = false, isDraggingObj = false;

        // Fare kontrolleri
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            if (Math.hypot(mx - eyePos.x, my - eyePos.y) < 30) isDraggingEye = true;
            else if (Math.hypot(mx - objPos.x, my - objPos.y) < 30) isDraggingObj = true;
        });
        window.addEventListener('mouseup', () => { isDraggingEye = isDraggingObj = false; });
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            if (isDraggingEye) {
                eyePos.x = Math.max(20, Math.min(canvas.width-20, mx));
                eyePos.y = Math.max(20, Math.min(SURFACE_Y - 40, my));
            }
            if (isDraggingObj) {
                objPos.x = Math.max(20, Math.min(canvas.width-20, mx));
                objPos.y = Math.max(SURFACE_Y + 40, Math.min(canvas.height-20, my));
            }
            draw();
        });

        // UI Güncellemeleri
        document.getElementById('n1Range').oninput = function() { n1 = parseFloat(this.value); document.getElementById('n1Val').innerText = n1.toFixed(2); draw(); };
        document.getElementById('n2Range').oninput = function() { n2Base = parseFloat(this.value); document.getElementById('n2Val').innerText = n2Base.toFixed(2); draw(); };
        document.getElementById('dispRange').oninput = function() { dispersion = parseFloat(this.value); document.getElementById('dispVal').innerText = dispersion.toFixed(2); draw(); };

        function findRefractionPoint(targetN2) {
            let low = -500, high = 1400; 
            for (let i = 0; i < 50; i++) {
                let mid = (low + high) / 2;
                let sinT1 = (mid - eyePos.x) / Math.hypot(mid - eyePos.x, SURFACE_Y - eyePos.y);
                let sinT2 = (objPos.x - mid) / Math.hypot(objPos.x - mid, objPos.y - SURFACE_Y);
                if (n1 * sinT1 < targetN2 * sinT2) low = mid;
                else high = mid;
            }
            return (low + high) / 2;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            statusDiv.innerText = "";
            document.getElementById('morN').innerText = (n2Base + 2*dispersion).toFixed(2);

            // Ortam Çizimleri
            ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, canvas.width, SURFACE_Y);
            ctx.fillStyle = "#0c4a6e"; ctx.fillRect(0, SURFACE_Y, canvas.width, canvas.height/2);
            ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, SURFACE_Y); ctx.lineTo(canvas.width, SURFACE_Y); ctx.stroke();

            // Renkleri tek tek işle
            colors.slice().reverse().forEach((c) => { // Morun üstte görünmesi için ters sıralama
                const n2Color = n2Base + (c.offsetK * dispersion);
                const surfX = findRefractionPoint(n2Color);
                
                // Tam Yansıma Kontrolü
                const sinT2 = Math.abs(objPos.x - surfX) / Math.hypot(objPos.x - surfX, objPos.y - SURFACE_Y);
                if ((n2Color * sinT2) / n1 >= 1.0) {
                    statusDiv.innerText = "DİKKAT: Tam yansıma! Işınlar yüzeyden çıkamıyor.";
                    return;
                }

                const dx = (surfX - eyePos.x) || 0.1;
                const slope = (SURFACE_Y - eyePos.y) / dx;
                const apparentY = SURFACE_Y + (objPos.x - surfX) * slope;

                // Gerçek Işınlar
                ctx.globalAlpha = 0.7;
                ctx.strokeStyle = c.color;
                ctx.lineWidth = 2.5;
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(objPos.x, objPos.y);
                ctx.lineTo(surfX, SURFACE_Y);
                ctx.lineTo(eyePos.x, eyePos.y);
                ctx.stroke();

                // Zahiri Işınlar
                ctx.globalAlpha = 0.4;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.moveTo(surfX, SURFACE_Y);
                ctx.lineTo(objPos.x, apparentY);
                ctx.stroke();

                // Zahiri Görüntüler
                ctx.globalAlpha = 0.9;
                ctx.fillStyle = c.color;
                ctx.beginPath();
                ctx.arc(objPos.x, apparentY, 10, 0, Math.PI*2);
                ctx.fill();
                
                // Bilgi metni (Zahiri görüntü yanına)
                ctx.fillStyle = "white";
                ctx.font = "bold 10px sans-serif";
                ctx.fillText(`${c.name} (n=${n2Color.toFixed(2)})`, objPos.x + 15, apparentY + 4);
            });

            // Gerçek Ana Nesne
            ctx.globalAlpha = 1.0;
            ctx.setLineDash([]);
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(objPos.x, objPos.y, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.font = "bold 11px sans-serif";
            ctx.fillText("OBJEYE", objPos.x - 22, objPos.y - 2);
            ctx.fillText("BAK", objPos.x - 12, objPos.y + 10);

            // Gözlemci (Stylized Eye)
            ctx.fillStyle = "white";
            ctx.beginPath(); 
            ctx.ellipse(eyePos.x, eyePos.y, 25, 15, 0, 0, Math.PI*2); 
            ctx.fill();
            ctx.fillStyle = "#0ea5e9";
            ctx.beginPath(); ctx.arc(eyePos.x, eyePos.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(eyePos.x, eyePos.y, 5, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#94a3b8"; ctx.font = "14px sans-serif";
            ctx.fillText("Gözlemci", eyePos.x - 30, eyePos.y - 30);
        }

        draw();
    </script>
</body>
</html>
