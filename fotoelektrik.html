<!DOCTYPE html>
<html>

<head>

<title>Photoelectric Effect Simulator</title>

<style>

body{
font-family:Arial;
margin:30px;
}


.container{

display:flex;
gap:40px;

}


.panel{

border:1px solid #aaa;
padding:20px;
width:500px;

}


input{

width:400px;

}


.spectrum{

height:40px;

background:linear-gradient(
to right,
violet,
blue,
cyan,
green,
yellow,
orange,
red
);

}


.photocell{

margin-top:30px;
height:150px;
border:3px solid black;
position:relative;
background:#eee;

}


.cathode{

position:absolute;
left:40px;
top:40px;
width:20px;
height:70px;
background:#333;

}



.anode{

position:absolute;
right:40px;
top:40px;
width:20px;
height:70px;
background:#999;

}



.electron{

position:absolute;
left:80px;
top:65px;
color:blue;
font-size:20px;

}



.meter{

border:3px solid black;
padding:20px;
font-size:30px;
width:150px;
text-align:center;

}



</style>


</head>


<body>


<h1>Photoelectric Effect Simulator</h1>



<div class="container">



<div class="panel">


<h2>Light Source</h2>


<div class="spectrum"></div>



<br>


Wavelength:


<br>


<input type="range"
id="lambda"
min="400"
max="700"
value="550">


<p>

λ =
<span id="lvalue">
550
</span>
nm

</p>





<h3>Light Intensity</h3>


<input type="range"
id="intensity"
min="1"
max="10"
value="1">


<p>

Photon number =
<span id="ivalue">
1
</span>

</p>






<h2>Metal</h2>


Work Function:


<br>


<input type="range"
id="phi"
min="1"
max="5"
step="0.1"
value="2.3">


<p>

Φ =
<span id="pvalue">
2.3
</span>
eV

</p>






<h2>Photocell</h2>



<div class="photocell">


<div class="cathode">

</div>


<div class="anode">

</div>


<div class="electron"
id="electron">


</div>



</div>




</div>







<div class="panel">


<h2>Ammeter</h2>


<div class="meter">


<span id="current">
0
</span>

µA


</div>


<br>


<div id="result">

</div>


</div>





</div>






<script>


const h = 6.626e-34;

const c = 3e8;

const eV = 1.602e-19;




let lambda =
document.getElementById("lambda");


let phi =
document.getElementById("phi");


let intensity =
document.getElementById("intensity");





function simulate(){



let wavelength =
Number(lambda.value);



let workFunction =
Number(phi.value);



let photons =
Number(intensity.value);





// photon energy


let photonEnergy =

(h*c)/(wavelength*1e-9)/eV;





// Einstein equation


let kineticEnergy =

photonEnergy - workFunction;





let electrons = 0;



if(kineticEnergy > 0){


/*

one photon ejects one electron

*/

electrons = photons;


}







document.getElementById("lvalue")
.innerHTML=wavelength;



document.getElementById("pvalue")
.innerHTML=workFunction.toFixed(2);



document.getElementById("ivalue")
.innerHTML=photons;







let electronBox =
document.getElementById("electron");



let current =
document.getElementById("current");





if(electrons>0){



electronBox.innerHTML="";



for(let i=0;i<electrons;i++){


electronBox.innerHTML += "→ e⁻ ";


}





current.innerHTML =

(electrons*5).toFixed(1);





document.getElementById("result")
.innerHTML=


"✅ Electron emission<br><br>"+

"Photon energy = "

+photonEnergy.toFixed(2)

+" eV<br>"+


"Electrons released = "

+electrons

+"<br>"+


"Kinetic energy = "

+kineticEnergy.toFixed(2)

+" eV";




}



else{



electronBox.innerHTML="";


current.innerHTML="0";



document.getElementById("result")
.innerHTML=


"❌ No electron emission<br><br>"+

"Photon energy = "

+photonEnergy.toFixed(2)

+" eV<br>"+

"Below threshold energy";



}





}






lambda.oninput=simulate;

phi.oninput=simulate;

intensity.oninput=simulate;



simulate();



</script>



</body>


</html>
